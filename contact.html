<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contactez-nous | Bois Gestion</title>
    <meta name="description"
        content="Contactez l'équipe de Bois Gestion pour vos projets d'achat ou de vente de bois dans le Grand Ouest.">
    <link rel="stylesheet" href="assets/css/contact.css">
    <link rel="stylesheet" href="assets/css/global.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Playfair+Display:wght@700&display=swap"

</head>

<body>

    <div id="header-placeholder"></div>

    <header class="hero-small">
        <h1>Contactez-nous</h1>
        <p>Une équipe à votre écoute pour vos projets forestiers</p>
    </header>

    <main class="container contact-page">

        <div class="contact-grid">
            <section class="team-section">
                <h2 class="section-title">Nos Experts sur le terrain</h2>

                <div class="employee-card">
                    <div class="emp-info">
                        <h3>Pascal Dagorne</h3>
                        <p class="role">Gérant / Expert Forestier</p>
                        <a href="tel:0612345678" class="contact-link">
                            <i class="fas fa-phone-alt"></i> 06 12 34 56 78
                        </a>
                        <a href="mailto:pascaldagorne@boisgestion.com" class="contact-link">
                            <i class="fas fa-envelope"></i> pascaldagorne@boisgestion.com
                        </a>
                    </div>
                </div>

                <div class="employee-card">
                    <div class="emp-info">
                        <h3>[Prénom Nom]</h3>
                        <p class="role">Technicien Forestier</p>
                        <a href="tel:0600000000" class="contact-link">
                            <i class="fas fa-phone-alt"></i> 06 00 00 00 00
                        </a>
                        <a href="mailto:contact@boisgestion.com" class="contact-link">
                            <i class="fas fa-envelope"></i> contact@boisgestion.com
                        </a>
                    </div>
                </div>
            </section>
        </div>

    </main>

    <div id="footer-placeholder"></div>

    <script src="assets/js/includes.js"></script>
</body>

</html>
